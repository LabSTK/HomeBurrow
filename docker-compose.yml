services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeburrow
      POSTGRES_PASSWORD: homeburrow
      POSTGRES_DB: homeburrow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/app/storage_data

volumes:
  postgres_data:
  storage_data:
